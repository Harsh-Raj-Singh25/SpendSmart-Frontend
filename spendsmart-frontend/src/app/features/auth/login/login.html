<div class="auth-wrapper">
  <!-- Dynamic Orbs for background decoration -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="glass-panel auth-card">
    <div class="auth-header">
      <h2 class="text-gradient">Welcome to SpendSmart</h2>
      <p>Log in to manage your budget effortlessly.</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" placeholder="you@example.com" class="glass-input">
        <div class="error-text" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="••••••••" class="glass-input">
      </div>

      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox"> Remember me
        </label>
        <a routerLink="/forgot-password" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary auth-submit" [disabled]="loading || form.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Sign In</span>
      </button>

      <div class="auth-divider">
        <span>OR</span>
      </div>

      <button type="button" class="btn-google" (click)="loginWithGoogle()">
        <img src="https://www.google.com/favicon.ico" alt="Google">
        Continue with Google
      </button>
      <div id="google-signin-btn" style="display:none;"></div>

      <p class="auth-footer">
        Don't have an account? <a routerLink="/register">Sign up now</a>
      </p>
    </form>
  </div>
</div>
