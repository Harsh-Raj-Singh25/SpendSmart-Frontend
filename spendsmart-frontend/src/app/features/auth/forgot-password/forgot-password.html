<div class="auth-wrapper">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="glass-panel auth-card">
    <div class="auth-header">
      <h2 class="text-gradient">Password Recovery</h2>
      <p *ngIf="step === 'EMAIL'">Enter your email to receive an OTP.</p>
      <p *ngIf="step === 'OTP'">Enter the OTP sent to {{ emailSentTo }}.</p>
    </div>

    <!-- Step 1: Request OTP -->
    <form *ngIf="step === 'EMAIL'" [formGroup]="emailForm" (ngSubmit)="requestOtp()" class="auth-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="you@example.com" class="glass-input">
      </div>
      
      <button type="submit" class="btn-primary auth-submit" [disabled]="loading || emailForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Send OTP</span>
      </button>
    </form>

    <!-- Step 2: Verify & Reset -->
    <form *ngIf="step === 'OTP'" [formGroup]="otpForm" (ngSubmit)="resetPassword()" class="auth-form">
      <div class="form-group">
        <label>Enter OTP</label>
        <input type="text" formControlName="otp" placeholder="123456" class="glass-input text-center text-lg tracking-widest">
      </div>
      
      <div class="form-group">
        <label>New Password</label>
        <input type="password" formControlName="newPassword" placeholder="••••••••" class="glass-input">
      </div>
      
      <button type="submit" class="btn-primary auth-submit" [disabled]="loading || otpForm.invalid">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Reset Password</span>
      </button>
    </form>
    
    <p class="auth-footer">
      Remember your password? <a routerLink="/login">Back to Login</a>
    </p>
  </div>
</div>
