<nav class="navbar glass-panel">
  <div class="navbar-container">
    <!-- Brand -->
    <div class="nav-brand">
      <span class="text-gradient">SpendSmart</span>
    </div>

    <!-- Hamburger Menu Button (Mobile) -->
    <button class="hamburger-btn" (click)="toggleMobileMenu()" [class.open]="mobileMenuOpen">
      <span class="line"></span>
      <span class="line"></span>
      <span class="line"></span>
    </button>

    <!-- Navigation Links -->
    <div class="nav-links" [class.open]="mobileMenuOpen">
      <!-- App Links (when logged in) -->
      <ng-container *ngIf="showAppLinks()">
        <div class="nav-section">
          <a routerLink="/dashboard" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 13h8V3H3v10Zm0 8h8v-6H3v6Zm10 0h8V11h-8v10Zm0-18v6h8V3h-8Z"/></svg>
            Dashboard
          </a>
          <a routerLink="/transactions" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1Zm0 4v7h18v-7H3Zm2 3h6v2H5v-2Z"/></svg>
            Transactions
          </a>
          <a routerLink="/budgets" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V4h2v16H4Zm4 0V10h2v10H8Zm4 0V6h2v14h-2Zm4 0v-8h2v8h-2Z"/></svg>
            Budgets
          </a>
          <a routerLink="/categories" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m21.4 11.6-9.9 9.9a2 2 0 0 1-2.8 0L2.5 15.3a2 2 0 0 1 0-2.8l9.9-9.9A2 2 0 0 1 13.8 2H20a2 2 0 0 1 2 2v6.2a2 2 0 0 1-.6 1.4ZM16.5 7a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3Z"/></svg>
            Categories
          </a>
          <a routerLink="/recurring" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 6l5 4V7c3.3 0 6 2.7 6 6 0 .7-.1 1.3-.3 1.9l1.9 1.1c.3-.9.4-1.9.4-3 0-4.4-3.6-8-8-8Zm-6 6c0-.7.1-1.3.3-1.9L4.4 8c-.3.9-.4 1.9-.4 3 0 4.4 3.6 8 8 8v3l5-4-5-4v3c-3.3 0-6-2.7-6-6Z"/></svg>
            Recurring
          </a>
          <a routerLink="/notifications" routerLinkActive="active" class="nav-item" (click)="closeMobileMenu()">
            <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6h-1V11a6 6 0 1 0-12 0v5H5a1 1 0 1 0 0 2h14a1 1 0 1 0 0-2Z"/></svg>
            Alerts
            <span class="alert-badge" *ngIf="notificationService.unreadCount() > 0">
              {{ notificationService.unreadCount() }}
            </span>
          </a>
        </div>

        <!-- Premium Section -->
        <div class="nav-divider"></div>
        <a routerLink="/premium" routerLinkActive="active" class="nav-premium" (click)="closeMobileMenu()">
          <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m12 2 2.45 6.63 7.05.38-5.5 4.42 1.86 6.86L12 16.4 6.14 20.3 8 13.43 2.5 9.01l7.05-.38L12 2Z"/></svg>
          Premium
        </a>

        <!-- Admin Section -->
        <ng-container *ngIf="isAdmin()">
          <div class="nav-divider"></div>
          <div class="nav-section admin-section">
            <div class="section-title">Admin Panel</div>
            <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item nav-admin" (click)="closeMobileMenu()">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m19.14 12.94.04-.94-.04-.94 2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.32 7.32 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.57.22-1.11.53-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.67 8.84a.5.5 0 0 0 .12.64l2.03 1.58-.04.94.04.94-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.52.41 1.06.72 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.84a.5.5 0 0 0 .5-.42l.36-2.54c.57-.22 1.11-.53 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
              Dashboard
            </a>
            <a routerLink="/admin/users" routerLinkActive="active" class="nav-item nav-admin" (click)="closeMobileMenu()">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M16 11a4 4 0 1 0-3.99-4A4 4 0 0 0 16 11ZM8 11a3 3 0 1 0-3-3 3 3 0 0 0 3 3Zm0 2c-2.67 0-8 1.34-8 4v2h10v-2c0-.76.29-1.46.77-2.06A12.9 12.9 0 0 0 8 13Zm8 0c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z"/></svg>
              Users
            </a>
            <a routerLink="/admin/expenses" routerLinkActive="active" class="nav-item nav-admin" (click)="closeMobileMenu()">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.14 2 5 4.24 5 7v10c0 2.76 3.14 5 7 5s7-2.24 7-5V7c0-2.76-3.14-5-7-5Zm0 2c2.87 0 5 .93 5 3s-2.13 3-5 3-5-.93-5-3 2.13-3 5-3Zm0 16c-2.87 0-5-.93-5-3v-2.1c1.28.93 3.09 1.4 5 1.4s3.72-.47 5-1.4V17c0 2.07-2.13 3-5 3Z"/></svg>
              Expenses
            </a>
            <a routerLink="/admin/incomes" routerLinkActive="active" class="nav-item nav-admin" (click)="closeMobileMenu()">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 6 9h4v7h4V9h4l-6-6Zm-7 15h14v3H5v-3Z"/></svg>
              Incomes
            </a>
            <a routerLink="/admin/budgets" routerLinkActive="active" class="nav-item nav-admin" (click)="closeMobileMenu()">
              <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20V4h2v16H4Zm4 0V10h2v10H8Zm4 0V6h2v14h-2Zm4 0v-8h2v8h-2Z"/></svg>
              Budgets
            </a>
          </div>
        </ng-container>

        <!-- Right-side Actions -->
        <div class="nav-divider"></div>
        <div class="nav-actions">
          <button class="btn-icon theme-toggle" (click)="toggleTheme()" title="Toggle Theme">
            <svg *ngIf="!isDarkMode()" class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.02-.68.06-1.01A1 1 0 0 0 9.9.93a10 10 0 1 0 13.17 13.17 1 1 0 0 0-1.07-1.31Z"/></svg>
            <svg *ngIf="isDarkMode()" class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84 5.34 3.42 3.93 4.84l1.41 1.41 1.42-1.41ZM1 13h3v-2H1v2Zm10-9h2V1h-2v3Zm8.66.42-1.42 1.42 1.41 1.41 1.42-1.41-1.41-1.42ZM17.24 19.16l1.42 1.42 1.41-1.42-1.41-1.41-1.42 1.41ZM20 11v2h3v-2h-3ZM11 20h2v3h-2v-3ZM4.34 17.75l-1.41 1.41 1.41 1.42 1.42-1.42-1.42-1.41ZM12 6a6 6 0 1 0 0 12 6 6 0 0 0 0-12Z"/></svg>
          </button>

          <!-- Profile Dropdown -->
          <div class="profile-dropdown-wrapper">
            <button class="profile-trigger" (click)="toggleProfileDropdown()">
              <span class="avatar-circle">{{ getUserInitial() }}</span>
              <span class="profile-name">{{ getUserName() }}</span>
              <span class="dropdown-arrow" [class.open]="showProfileDropdown">▾</span>
            </button>

            <div class="profile-dropdown" *ngIf="showProfileDropdown">
              <div class="dropdown-header">
                <span class="avatar-circle lg">{{ getUserInitial() }}</span>
                <div class="dropdown-user-info">
                  <strong>{{ getUserName() }}</strong>
                  <span>{{ getUserEmail() }}</span>
                </div>
              </div>
              <div class="dropdown-role" *ngIf="isAdmin()">ADMIN</div>
              <div class="dropdown-divider"></div>
              <button class="dropdown-item" (click)="goToProfile()">
                <svg class="dropdown-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/></svg>
                Profile
              </button>
              <button class="dropdown-item" (click)="logout()">
                <svg class="dropdown-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 17v-2h7V9h-7V7h7a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-7Zm-1 4H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4v2H5v14h4v2Zm2.59-5.59L14 13H7v-2h7l-2.41-2.41L13 7l5 5-5 5-1.41-1.41Z"/></svg>
                Logout
              </button>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- Auth Links (when not logged in) -->
      <ng-container *ngIf="!showAppLinks()">
        <div class="nav-section">
          <!-- Landing Page Links -->
          <ng-container *ngIf="isLandingPage()">
            <a class="nav-item" (click)="onLandingNav('showcase')" style="cursor: pointer;">
              Showcase
            </a>
            <a class="nav-item" (click)="onLandingNav('benefits')" style="cursor: pointer;">
              Benefits
            </a>
            <a class="nav-item" (click)="onLandingNav('pricing')" style="cursor: pointer;">
              Pricing
            </a>
            <a class="nav-item" (click)="onLandingNav('faq')" style="cursor: pointer;">
              FAQ
            </a>
          </ng-container>
        </div>

        <div class="nav-divider"></div>
        <div class="nav-actions auth-actions">
          <button class="btn-icon theme-toggle" (click)="toggleTheme()">
            <svg *ngIf="!isDarkMode()" class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.79A9 9 0 0 1 11.21 3c0-.34.02-.68.06-1.01A1 1 0 0 0 9.9.93a10 10 0 1 0 13.17 13.17 1 1 0 0 0-1.07-1.31Z"/></svg>
            <svg *ngIf="isDarkMode()" class="action-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6.76 4.84 5.34 3.42 3.93 4.84l1.41 1.41 1.42-1.41ZM1 13h3v-2H1v2Zm10-9h2V1h-2v3Zm8.66.42-1.42 1.42 1.41 1.41 1.42-1.41-1.41-1.42ZM17.24 19.16l1.42 1.42 1.41-1.42-1.41-1.41-1.42 1.41ZM20 11v2h3v-2h-3ZM11 20h2v3h-2v-3ZM4.34 17.75l-1.41 1.41 1.41 1.42 1.42-1.42-1.42-1.41ZM12 6a6 6 0 1 0 0 12 6 6 0 0 0 0-12Z"/></svg>
          </button>

          <div class="auth-toggle" *ngIf="!isLoggedIn()">
            <a
              routerLink="/login"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="auth-toggle-link"
              (click)="closeMobileMenu()"
            >
              Login
            </a>
            <a
              routerLink="/register"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              class="auth-toggle-link"
              (click)="closeMobileMenu()"
            >
              Sign Up
            </a>
          </div>
        </div>
      </ng-container>
    </div>
  </div>
</nav>
