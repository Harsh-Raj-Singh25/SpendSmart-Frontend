<nav class="navbar glass-panel">
  <div class="nav-brand">
    <span class="text-gradient">SpendSmart</span>
  </div>
  
  <div class="nav-links">
    <!-- Links when logged in AND on app pages (not auth pages) -->
    <ng-container *ngIf="showAppLinks()">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">Dashboard</a>
      <a routerLink="/notifications" routerLinkActive="active" class="nav-item">
        Alerts
        <span *ngIf="notificationService.unreadCount() > 0">({{ notificationService.unreadCount() }})</span>
      </a>
      <a routerLink="/recurring" routerLinkActive="active" class="nav-item">Recurring</a>
      <a routerLink="/premium" routerLinkActive="active" class="nav-premium">
        <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 0 24 24" width="20" fill="currentColor">
          <path d="M12 2l2.4 7.4h7.6l-6 4.6 2.3 7.4-6.3-4.8L5.7 21.4l2.3-7.4-6-4.6h7.6L12 2z"/>
        </svg>
        Premium
      </a>

      <ng-container *ngIf="isAdmin()">
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item nav-admin">Admin Dashboard</a>
        <a routerLink="/admin/users" routerLinkActive="active" class="nav-item nav-admin">Users</a>
        <a routerLink="/admin/expenses" routerLinkActive="active" class="nav-item nav-admin">Expenses</a>
        <a routerLink="/admin/incomes" routerLinkActive="active" class="nav-item nav-admin">Incomes</a>
        <a routerLink="/admin/budgets" routerLinkActive="active" class="nav-item nav-admin">Budgets</a>
      </ng-container>

      <button class="btn-icon" (click)="toggleTheme()">
        <span *ngIf="!isDarkMode()">🌙</span>
        <span *ngIf="isDarkMode()">☀️</span>
      </button>

      <!-- Profile Dropdown -->
      <div class="profile-dropdown-wrapper">
        <button class="profile-trigger" (click)="toggleProfileDropdown()">
          <span class="avatar-circle">{{ getUserInitial() }}</span>
          <span class="profile-name">{{ getUserName() }}</span>
          <span class="dropdown-arrow" [class.open]="showProfileDropdown">▾</span>
        </button>
        
        <div class="profile-dropdown" *ngIf="showProfileDropdown">
          <div class="dropdown-header">
            <span class="avatar-circle lg">{{ getUserInitial() }}</span>
            <div class="dropdown-user-info">
              <strong>{{ getUserName() }}</strong>
              <span>{{ getUserEmail() }}</span>
            </div>
          </div>
          <div class="dropdown-role" *ngIf="isAdmin()">ADMIN</div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="goToProfile()">
            <span class="dropdown-icon">👤</span>
            Profile
          </button>
          <button class="dropdown-item" (click)="logout()">
            <span class="dropdown-icon">🚪</span>
            Logout
          </button>
        </div>
      </div>
    </ng-container>

    <!-- Links when not logged in OR on auth pages -->
    <ng-container *ngIf="!showAppLinks()">
      <div class="auth-actions">
        <button class="btn-icon" (click)="toggleTheme()">
          <span *ngIf="!isDarkMode()">🌙</span>
          <span *ngIf="isDarkMode()">☀️</span>
        </button>
        <div class="auth-toggle" *ngIf="!isLoggedIn()">
          <a
            routerLink="/login"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="auth-toggle-link"
          >
            Login
          </a>
          <a
            routerLink="/register"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="auth-toggle-link"
          >
            Sign Up
          </a>
        </div>
      </div>
    </ng-container>
  </div>
</nav>
